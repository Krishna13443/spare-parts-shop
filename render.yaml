services:
  - type: web
    name: sparkmotors-shop
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sparkmotors-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: sparkmotors-db
    plan: free
    ipAllowList: [] # Allow all connections
